<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Ecosystem Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .nav-button:hover {
            background-color: #2980b9;
        }

        .nav-button.attendance {
            background-color: #e74c3c;
        }

        .nav-button.attendance:hover {
            background-color: #c0392b;
        }

        .nav-button.notes {
            background-color: #2ecc71;
        }

        .nav-button.notes:hover {
            background-color: #27ae60;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>College Ecosystem</h1>
        <p>Welcome to the unified campus portal. Select an application to begin.</p>
        <div class="nav-links">
            <a href="/attendance/" class="nav-button attendance">📋 Attendance System</a>
            <a href="/study/" class="nav-button">📚 AI Study Assistant</a>
            <a href="/notes" class="nav-button notes">📝 Peer Notes Hub</a>
        </div>
    </div>
</body>

</html>
