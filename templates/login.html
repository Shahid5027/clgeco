<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH | Ecosystem</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <div class="login-wrapper">
        <div class="brutalist-form observe-me">
            <h2 class="form-title">SYSTEM_AUTH</h2>

            {% if error %}
            <div class="flash-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="">
                <input type="hidden" name="next" value="{{ next or '' }}">
                <div class="form-group border-block" style="padding: 20px;">
                    <label class="form-label">IDENTITY_NODE</label>
                    <input type="text" name="username" class="form-input" required placeholder="[ ID OR EMAIL ]">
                    <div class="form-hint">STUDENTS: USE LAST 3 DIGITS OF USN</div>
                </div>

                <div class="form-group border-block" style="padding: 20px;">
                    <label class="form-label">SECURITY_KEY</label>
                    <input type="password" name="password" class="form-input" required placeholder="[ PASSWORD ]">
                </div>

                <button type="submit" class="form-submit">AUTHENTICATE</button>
            </form>
        </div>
    </div>

    <script>
        // Vanilla Intersection Observer for Motion
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.observe-me').forEach((el) => {
            el.classList.add('reveal');
            observer.observe(el);
        });
    </script>
</body>

</html>
