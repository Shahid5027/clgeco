{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Student Login</h4>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger text-center">{{ error }}</div>
                {% endif %}

                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label for="roll_suffix" class="form-label">Roll Number</label>
                        <div class="input-group">
                            <span class="input-group-text">{{ prefix }}</span>
                            <input type="text" 
                                   class="form-control" 
                                   id="roll_suffix" 
                                   name="roll_suffix" 
                                   placeholder="121" 
                                   maxlength="3" 
                                   pattern="[0-9]{3}" 
                                   required>
                        </div>
                        <div class="form-text">
                            Enter your 3-digit roll number suffix (e.g., <code>121</code> for {{ prefix }}121)
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Login
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="mb-1">Don’t have an account?</p>
                    <a href="{{ url_for('student_register') }}" class="btn btn-outline-secondary btn-sm">
                        Register Here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
